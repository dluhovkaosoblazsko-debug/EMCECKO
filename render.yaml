services:
  - type: web
    name: mosty-v-rodine
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_SHEETS_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_EMAIL
        sync: false
      - key: GOOGLE_PRIVATE_KEY
        sync: false
      - key: GOOGLE_SHEETS_STATE_TAB
        value: AppState
    disk:
      name: mosty-v-rodine-data
      mountPath: /var/data
      sizeGB: 1
