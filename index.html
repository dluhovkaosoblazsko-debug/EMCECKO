<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mosty v rodině | Evidence služby a evaluace</title>
  <style>
    :root {
      --bg: #263341;
      --panel: #e3e9ef;
      --panel-soft: #d3dde7;
      --line: #b1c0ce;
      --text: #152f47;
      --muted: #5f7387;
      --primary: #0f6b8b;
      --primary-dark: #09516a;
      --accent: #d29b46;
      --success: #1f7a56;
      --danger: #a33b45;
      --shadow: 0 14px 32px rgba(7, 20, 35, 0.16);
      --radius: 16px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(76, 120, 168, 0.24), transparent 30%),
        radial-gradient(circle at bottom right, rgba(34, 70, 108, 0.18), transparent 28%),
        linear-gradient(180deg, #374656 0%, #2a3846 100%);
      color: var(--text);
      line-height: 1.4;
    }

    button, input, select, textarea {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: linear-gradient(180deg, #16324f 0%, #20496e 100%);
      color: white;
      padding: 22px 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.55rem;
      line-height: 1.1;
    }

    .brand p {
      margin: 10px 0 0;
      color: rgba(255,255,255,0.75);
      font-size: 0.94rem;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 4px 2px 8px;
    }

    .brand img {
      display: block;
      width: 100%;
      max-width: 190px;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 6px 14px rgba(0, 0, 0, 0.18));
    }

    .sidebar button {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 10px 13px;
      background: transparent;
      color: white;
      text-align: left;
      cursor: pointer;
      transition: 0.18s ease;
      font-weight: 600;
    }

    .sidebar button.active,
    .sidebar button:hover {
      background: rgba(255,255,255,0.14);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    .sidebar .cta {
      margin-top: auto;
      background: #f2b14e;
      color: #173049;
      font-weight: 700;
    }

    .sidebar-alerts {
      display: grid;
      gap: 10px;
      margin-top: auto;
    }

    .sidebar-alert-card {
      padding: 12px 13px;
      border-radius: 14px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.14);
      display: grid;
      gap: 6px;
    }

    .sidebar-alert-card strong {
      font-size: 0.95rem;
      color: #fff7dd;
    }

    .sidebar-alert-card p {
      margin: 0;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.88);
      line-height: 1.35;
    }

    .sidebar-alert-card button {
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(255,255,255,0.14);
      font-size: 0.82rem;
    }

    .main {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 0;
    }

    .hero,
    .panel,
    .card,
    .record,
    .metric,
    .tab-panel,
    .section-card {
      background: linear-gradient(180deg, rgba(231, 238, 245, 0.98) 0%, rgba(221, 231, 240, 0.98) 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 20px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      background:
        radial-gradient(circle at top right, rgba(213,139,42,0.12), transparent 30%),
        linear-gradient(135deg, #eaf0f5 0%, #dde6ee 100%);
    }

    .hero h2 {
      margin: 0 0 8px;
      font-size: 1.65rem;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      max-width: 760px;
    }

    .toolbar,
    .toolbar-right,
    .filters,
    .tabs,
    .grid,
    .inline-actions,
    .summary {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .metric {
      padding: 14px 16px;
    }

    .metric h3 {
      margin: 0 0 8px;
      font-size: 0.92rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .metric strong {
      font-size: 1.55rem;
      display: block;
    }

    .panel,
    .tab-panel {
      padding: 16px;
    }

    .panel h3,
    .tab-panel h3,
    .section-title {
      margin: 0 0 14px;
      font-size: 1.15rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      align-items: stretch;
    }

    .card,
    .record {
      padding: 12px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table.compact-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    .compact-table th,
    .compact-table td {
      padding: 6px 8px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }

    .compact-table th {
      font-size: 0.69rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      background: #d9e3eb;
      position: sticky;
      top: 0;
    }

    .compact-table td {
      font-size: 0.84rem;
      line-height: 1.3;
    }

    .compact-table tbody tr:nth-child(odd) td {
      background: rgba(255, 255, 255, 0.28);
    }

    .compact-table tr:hover td {
      background: #f2f7fb;
    }

    .compact-table .actions {
      white-space: nowrap;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .card h4,
    .record h4 {
      margin: 0 0 8px;
      font-size: 1.05rem;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .meta div {
      background: var(--panel-soft);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 9px 10px;
    }

    .compact-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .compact-meta .meta-pill {
      display: inline-flex;
      align-items: baseline;
      gap: 4px;
      padding: 5px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-soft);
      font-size: 0.8rem;
      line-height: 1.1;
    }

    .compact-meta .meta-pill span {
      color: var(--muted);
      font-size: 0.8rem;
    }

    .compact-meta .meta-pill strong {
      font-size: 0.84rem;
      font-weight: 700;
      color: var(--text);
    }

    .meta span,
    .hint,
    .empty,
    .badge-soft {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .badge,
    .badge-soft {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.8rem;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .badge-active { background: #dcf7eb; color: #146946; }
    .badge-paused { background: #fff0d7; color: #8b5a00; }
    .badge-closed { background: #fde3e6; color: #8f2831; }
    .badge-soft { background: #f3f6fa; border-color: var(--line); }

    .tabs button,
    .btn,
    .btn-secondary,
    .btn-danger,
    .btn-ghost {
      border: 0;
      border-radius: 12px;
      padding: 9px 13px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .tabs button {
      background: #edf3f8;
      color: var(--text);
      font-weight: 600;
    }

    .tabs button.active {
      background: var(--primary);
      color: white;
    }

    .btn {
      background: var(--primary);
      color: white;
      font-weight: 700;
    }

    .btn:hover { background: var(--primary-dark); }

    .btn-secondary {
      background: #f2b14e;
      color: #1b3247;
      font-weight: 700;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
      font-weight: 700;
    }

    .btn-ghost {
      background: #edf3f8;
      color: var(--text);
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
      outline: 3px solid rgba(16, 110, 142, 0.3);
      outline-offset: 1px;
    }

    .search {
      width: min(420px, 100%);
    }

    .search input,
    form input,
    form select,
    form textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.9);
      border-radius: 12px;
      padding: 9px 11px;
      color: var(--text);
    }

    form input,
    form select {
      min-height: 40px;
    }

    form textarea {
      min-height: 84px;
      resize: vertical;
    }

    form {
      display: grid;
      gap: 12px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .form-grid-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .form-grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .form-block-accent {
      padding: 14px;
      border: 1px solid #ecd9b6;
      border-radius: 16px;
      background: linear-gradient(180deg, #fff8ea 0%, #fff1d8 100%);
    }

    .form-block-soft {
      padding: 14px;
      border-radius: 16px;
      border: 1px solid var(--line);
    }

    .form-block-blue {
      background: linear-gradient(180deg, #f4f9ff 0%, #ebf4ff 100%);
    }

    .form-block-green {
      background: linear-gradient(180deg, #f6fbf2 0%, #edf7e6 100%);
    }

    .form-block-rose {
      background: linear-gradient(180deg, #fff6f7 0%, #ffecee 100%);
    }

    .form-surface-muted {
      padding: 18px;
      border-radius: 18px;
      background: linear-gradient(180deg, #e4e8ee 0%, #d7dee7 100%);
      border: 1px solid #c4ced9;
    }

    .full {
      grid-column: 1 / -1;
    }

    label {
      display: grid;
      gap: 8px;
      font-weight: 600;
      font-size: 0.96rem;
    }

    details {
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: rgba(236, 242, 248, 0.92);
    }

    summary {
      list-style: none;
      cursor: pointer;
      padding: 12px 15px;
      font-weight: 700;
      background: #eef3f8;
    }

    summary::-webkit-details-marker { display: none; }

    .details-body {
      padding: 14px;
      border-top: 1px solid var(--line);
      display: grid;
      gap: 14px;
    }

    .timeline {
      display: grid;
      gap: 14px;
    }

    .record p {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .record strong {
      color: var(--text);
    }

    .case-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 14px;
    }

    .case-header h3 {
      font-size: 1.5rem;
      margin-bottom: 6px;
    }

    .case-header-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .case-header-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      max-width: 100%;
    }

    .case-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
      align-items: center;
    }

    .case-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 8;
      background: linear-gradient(180deg, rgba(225, 234, 243, 0.98) 0%, rgba(221, 231, 240, 0.98) 100%);
      padding-top: 8px;
    }

    .case-tabs button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
      background: #edf3f8;
      color: var(--text);
      font-weight: 700;
    }

    .case-tabs button.active {
      background: var(--primary);
      color: white;
    }

    .case-intro {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .section-card {
      padding: 0;
      overflow: hidden;
    }

    .section-card.personal {
      background: linear-gradient(180deg, #eef5fb 0%, #e2edf8 100%);
      border-color: #cfe0f0;
    }

    .section-card.intake {
      background: linear-gradient(180deg, #eef1f5 0%, #e2e7ee 100%);
      border-color: #d0d8e2;
    }

    .section-card.plan {
      background: linear-gradient(180deg, #fff7e8 0%, #f8ecd1 100%);
      border-color: #eed8ac;
    }

    .section-card.progress {
      background: linear-gradient(180deg, #f2f0ff 0%, #e6e1fb 100%);
      border-color: #d8cff7;
    }

    .section-card.outcome {
      background: linear-gradient(180deg, #fff1f2 0%, #ffe3e6 100%);
      border-color: #f2cdd3;
    }

    .section-card + .section-card {
      margin-top: 12px;
    }

    .section-header {
      padding: 14px 18px;
      background: linear-gradient(180deg, #fbfdff 0%, #f4f8fc 100%);
      border-bottom: 1px solid var(--line);
    }

    .section-header h4 {
      margin: 0;
      font-size: 1rem;
    }

    .section-header p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .section-card summary {
      padding: 12px 15px;
      font-weight: 700;
      border-bottom: 1px solid transparent;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .section-card[open] summary {
      border-bottom-color: var(--line);
    }

    .section-card.personal summary {
      background: linear-gradient(180deg, #d7e4ef 0%, #ccdae7 100%);
      color: #18486b;
    }

    .section-card.intake summary {
      background: linear-gradient(180deg, #d8e3d4 0%, #cedcc9 100%);
      color: #295d35;
    }

    .section-card.plan summary {
      background: linear-gradient(180deg, #e5d8c2 0%, #dacbae 100%);
      color: #7a5312;
    }

    .section-card.progress summary {
      background: linear-gradient(180deg, #dad8eb 0%, #cfcae2 100%);
      color: #443f8c;
    }

    .section-card.outcome summary {
      background: linear-gradient(180deg, #e8d8dc 0%, #ddc9cf 100%);
      color: #8a2f3d;
    }

    .section-body {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .summary-note {
      margin: 0;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 14px;
    }

    .ip-layout {
      display: grid;
      grid-template-columns: 1.5fr 0.9fr;
      gap: 12px;
      align-items: start;
    }

    .intervention-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: start;
    }

    .intervention-form-card {
      background: linear-gradient(180deg, #efe9de 0%, #e6ded0 100%);
      border: 1px solid #d3c6b3;
    }

    .intervention-overview-card {
      background: linear-gradient(180deg, #efeaf7 0%, #e5def2 100%);
      border: 1px solid #d4c8e6;
    }

    .template-strip {
      display: grid;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.55);
      border: 1px dashed #c9bba6;
      margin-bottom: 12px;
    }

    .ai-assist-box {
      display: grid;
      gap: 10px;
      padding: 12px;
      border-radius: 12px;
      background: linear-gradient(180deg, #eef7fb 0%, #e5f0f7 100%);
      border: 1px solid #c7dae7;
      margin-bottom: 14px;
    }

    .ai-assist-box strong {
      font-size: 0.95rem;
    }

    .ai-assist-box textarea {
      min-height: 72px;
      background: rgba(255,255,255,0.92);
    }

    .intervention-scroll {
      max-height: 48vh;
      overflow: auto;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.72);
    }

    .ip-sidebar {
      display: grid;
      gap: 12px;
      position: sticky;
      top: 12px;
    }

    .timeline-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(180deg, #f9fbfd 0%, #f1f6fa 100%);
      padding: 10px 12px;
      display: grid;
      gap: 6px;
    }

    .timeline-card.active {
      border-color: #f0c36b;
      background: linear-gradient(180deg, #fffaf0 0%, #fff5df 100%);
    }

    .timeline-card button {
      border: 0;
      background: transparent;
      text-align: left;
      padding: 0;
      cursor: pointer;
      color: inherit;
      font: inherit;
    }

    .timeline-title {
      font-weight: 700;
      font-size: 0.95rem;
    }

    .timeline-meta {
      font-size: 0.86rem;
      color: var(--muted);
      line-height: 1.35;
    }

    dialog {
      border: 0;
      padding: 0;
      width: min(980px, calc(100vw - 24px));
      border-radius: 22px;
      box-shadow: 0 28px 60px rgba(0,0,0,0.22);
    }

    dialog::backdrop {
      background: rgba(18, 32, 46, 0.46);
      backdrop-filter: blur(3px);
    }

    .modal {
      padding: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbfd 100%);
    }

    .modal header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .modal header h3 {
      margin: 0;
    }

    .close {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 0;
      background: #edf3f8;
      cursor: pointer;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
    }

    .score-box {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 12px;
      background: linear-gradient(180deg, #f8fbfd 0%, #f1f6fa 100%);
    }

    .score-list {
      display: grid;
      gap: 8px;
    }

    .score-row {
      display: grid;
      grid-template-columns: minmax(180px, 220px) 70px 1fr;
      gap: 12px;
      align-items: start;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(180deg, #f9fbfd 0%, #f2f6fa 100%);
    }

    .score-row strong {
      font-size: 0.92rem;
    }

    .score-row .score-value {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 30px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: white;
      font-weight: 700;
      font-size: 0.88rem;
    }

    .score-row .score-comment {
      font-size: 0.9rem;
      line-height: 1.4;
      color: var(--text);
    }

    .compact-block {
      display: grid;
      gap: 10px;
    }

    .compact-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .mini-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      background: linear-gradient(180deg, #f9fbfd 0%, #f1f6fa 100%);
    }

    .mini-card h5 {
      margin: 0 0 8px;
      font-size: 0.95rem;
    }

    .mini-lines {
      display: grid;
      gap: 4px;
      font-size: 0.92rem;
      line-height: 1.35;
    }

    .mini-lines strong {
      color: var(--text);
    }

    .goal-card {
      padding: 0;
      overflow: hidden;
    }

    .goal-card summary {
      list-style: none;
      cursor: pointer;
      padding: 12px 14px;
      display: grid;
      gap: 10px;
    }

    .goal-card summary::-webkit-details-marker {
      display: none;
    }

    .goal-card[open] summary {
      border-bottom: 1px solid var(--line);
      background: #f4f8fc;
    }

    .goal-card .goal-body {
      padding: 12px 14px;
    }

    .event-list {
      display: grid;
      gap: 10px;
    }

    .event-row {
      border: 1px solid var(--line);
      border-radius: 12px;

      background: rgba(25, 50, 74, 0.1);

      border-radius: 999px;
      background: linear-gradient(90deg, #0f6c8d 0%, #2a9274 100%);

      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.84rem;
      color: var(--muted);

      font-size: 0.74rem;

      text-transform: uppercase;
      background: #edf3f8;

      color: #1e6a4e;
    }

      background: #fff0cf;
      color: #8c5a00;
    }

      background: #f8dedd;
      color: #8c313a;
    }

      padding: 14px 16px;
      border-radius: 22px;
      border: 1px solid #d6d9c8;
      background:

          openApplicantForm();
          return;

        if (currentView === "contracts") {
          openContractForm();
          return;
        }
        if (currentView === "team") {
          openWorkerForm();
          return;
        }
        if (currentView === "groups") {
          openGroupActivityForm();
          return;

          if (selectedEvaluationTab === "family") {
            openFamilyInterviewForm();
            return;
          }
          if (selectedEvaluationTab === "worker") {
            openWorkerInterviewForm();

          return;
        }

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        return structuredClone(demoData);
      }
      try {
        const parsed = JSON.parse(raw);
        parsed.projectTracking = {
          cooperationIncreasePercent: Number(parsed.projectTracking?.cooperationIncreasePercent || 0),
          teamCompetenceCount: Number(parsed.projectTracking?.teamCompetenceCount || 0)
        };
        parsed.aiSettings = {
          model: String(parsed.aiSettings?.model || "gemini-2.5-flash")
        };
        parsed.applicants = (parsed.applicants || []).map(item => ({
          ...item,
          vazbaKartaPripadu: item.vazbaKartaPripadu || "",
          duvodOdmítnutí: item.duvodOdmítnutí || "",
          poznamka: item.poznamka || ""
        }));
        parsed.contracts = (parsed.contracts || []).map(item => ({
          ...item,
          pocetDodatku: Number(item.pocetDodatku || 0),
          uhrazenoKlientem: Boolean(item.uhrazenoKlientem),
          informovanySouhlas: item.informovanySouhlas !== false
        }));
        parsed.groupActivities = (parsed.groupActivities || []).map(item => ({
          ...item,
          delkaTrvaniMin: Number(item.delkaTrvaniMin || 0)
        }));
        parsed.groupAttendances = (parsed.groupAttendances || []).map(item => ({
          ...item,
          osvojeniDovednosti: Boolean(item.osvojeniDovednosti)
        }));
        parsed.workers = (parsed.workers || []).map(item => ({
          ...item,
          odbornyPracovnik: item.odbornyPracovnik !== false,
          datumNastupu: item.datumNastupu || "",
          poznamka: item.poznamka || ""
        }));
        parsed.educationRecords = (parsed.educationRecords || []).map(item => ({
          ...item,
          hodiny: Number(item.hodiny || 0),
          organizator: item.organizator || "",
          osvedceni: item.osvedceni || "ne"
        }));
        parsed.supervisions = (parsed.supervisions || []).map(item => ({
          ...item,
          participantIds: Array.isArray(item.participantIds) ? item.participantIds : [],
          participantNames: Array.isArray(item.participantNames) ? item.participantNames : [],
          zapis: item.zapis || ""
        }));
        parsed.evaluationActivities = {
          familyInterviews: (parsed.evaluationActivities?.familyInterviews || []).map(item => ({
            ...item,
            participantIds: Array.isArray(item.participantIds) ? item.participantIds : [],
            participantNames: Array.isArray(item.participantNames) ? item.participantNames : []
          })),
          workerInterviews: parsed.evaluationActivities?.workerInterviews || [],
          partnerInterviews: parsed.evaluationActivities?.partnerInterviews || [],
          caseStudies: parsed.evaluationActivities?.caseStudies || []
        };
        parsed.cases = (parsed.cases || []).map(item => ({
          ...item,
          intervence: (item.intervence || []).map(row => ({
            ...row,
            odbornostiMdt: Array.isArray(row.odbornostiMdt) ? row.odbornostiMdt : splitComma(row.odbornostiMdt),
            jednaniSOspod: row.jednaniSOspod || "ne",
            vazbaNaIpodIntervence: row.vazbaNaIpodIntervence || "ne"
          })),
          projektoveCile: item.projektoveCile || {
            zlepseniKomunikaceRodicu: "nerelevantní",
            snizeniKrizovychSituaci: "nerelevantní",
            konstruktivniReseniKonfliktu: "nerelevantní",
            dohodaOPorozvodovePeci: "nerelevantní"
          }
        }));
        return parsed;
      } catch (error) {
        console.error(error);
        return structuredClone(demoData);
      }
    }

    async function initializeState() {
      try {
        const response = await fetch("/api/state", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`API ${response.status}`);
        }
        const remote = await response.json();
        if (remote && Object.keys(remote).length) {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(remote));
        }
      } catch (error) {
        console.warn("Remote state unavailable, falling back to localStorage.", error);
      }
      return loadState();
    }

        const response = await fetch("/api/state", {
          method: "PUT",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(state)
        });
        if (!response.ok) {
          throw new Error(`API ${response.status}`);
        }
        savedToServer = true;
      } catch (error) {
        console.warn("Remote save failed, local backup kept.", error);
      }
      if (showAlert) {
        alert(savedToServer ? "Změny byly uloženy na server a zároveň i v tomto prohlížeči." : "Server se nepodařilo uložit. Změny zatím zůstaly jen v tomto prohlížeči.");
      }
      render();
      return;
      alert("Změny byly uloženy do localStorage tohoto prohlížeče.");
      render();
    }

    function render() {
      const selectedCase = state.cases.find(item => item.id === selectedCaseId) || null;
      renderSidebarAlerts();
      updatePrimaryCta();

      if (currentView === "dashboard") {
        renderDashboard();
        return;
      }

      if (currentView === "clients") {
        renderClients();
        return;
      }

      if (currentView === "applicants") {
        renderApplicants();
        return;
      }

      if (currentView === "contracts") {
        renderContracts();
        return;
      }

      if (currentView === "team") {
        renderTeam();
        return;
      }

      if (currentView === "groups") {
        renderGroups();
        return;
      }

      if (currentView === "evaluations") {
        renderEvaluationActivities();
        return;
      }

      if (currentView === "cases") {
        renderCases(selectedCase);
        return;
      }

      currentView = "dashboard";
      renderDashboard();
    }

    function updatePrimaryCta() {
      const cta = document.getElementById("newCaseBtn");
      if (!cta) return;
      if (currentView === "applicants") {
        cta.textContent = "Nový zájemce";
        return;
      }
      if (currentView === "contracts") {
        cta.textContent = "Nová smlouva";
        return;
      }
      if (currentView === "team") {
        cta.textContent = "Nový pracovník";
        return;
      }
      if (currentView === "groups") {
        cta.textContent = "Nová skupinová aktivita";
        return;
      }
      if (currentView === "evaluations") {
        cta.textContent = selectedEvaluationTab === "family"
          ? "Nový rozhovor s rodinou"
          : selectedEvaluationTab === "worker"
            ? "Nový rozhovor s pracovníkem"
            : selectedEvaluationTab === "partner"
              ? "Nový rozhovor s partnerem"
              : "Nová případová studie";
        return;
      }
      cta.textContent = "Založit nový případ";
    }

      const selectedInterventionId = selectedInterventionByCase[item.id] || combinedInterventions[0]?.id || null;

          document.querySelectorAll(".nav-btn").forEach(item => item.classList.remove("active"));
          document.querySelector('[data-view="cases"]').classList.add("active");
          render();
        });
      });
    }

    function bindCaseActionButtons() {
      const inlineInputForm = document.getElementById("inlineInputForm");
      if (inlineInputForm) {
        inlineInputForm.addEventListener("submit", event => {
          event.preventDefault();
          const item = getCase(inlineInputForm.dataset.caseId);
          saveInputData(item, new FormData(inlineInputForm));
          saveState();
        });
      }
      const inlineInterventionForm = document.getElementById("inlineInterventionForm");
      if (inlineInterventionForm) {
        const templateSelect = inlineInterventionForm.querySelector("[data-intervention-template]");
        if (templateSelect) {
          templateSelect.addEventListener("change", () => {
            applyInterventionTemplateToForm(inlineInterventionForm, templateSelect.value);
          });
        }
        inlineInterventionForm.addEventListener("submit", event => {
          event.preventDefault();
          const item = getCase(inlineInterventionForm.dataset.caseId);
          saveInterventionData(item, new FormData(inlineInterventionForm));
          saveState();
          render();
        });
      }
      document.querySelectorAll("[data-case-section]").forEach(btn => {
        btn.addEventListener("click", () => {
          selectedCaseSectionByCase[btn.dataset.caseSection] = btn.dataset.section;
          render();
        });
      });
      document.querySelectorAll("[data-select-plan]").forEach(btn => {
        btn.addEventListener("click", () => {
          selectedPlanByCase[btn.dataset.selectPlan] = btn.dataset.planId;
          selectedCaseSectionByCase[btn.dataset.selectPlan] = "ip";
          delete selectedEvaluationByCase[btn.dataset.selectPlan];
          render();
        });
      });
      document.querySelectorAll("[data-select-evaluation]").forEach(btn => {
        btn.addEventListener("click", () => {
          selectedEvaluationByCase[btn.dataset.selectEvaluation] = btn.dataset.evaluationId;
          render();
        });
      });
      document.querySelectorAll("[data-select-intervention]").forEach(btn => {
        btn.addEventListener("click", () => {
          selectedInterventionByCase[btn.dataset.selectIntervention] = btn.dataset.interventionId;
          selectedCaseSectionByCase[btn.dataset.selectIntervention] = "intervence";
          render();
        });
      });
      document.querySelectorAll("[data-action]").forEach(btn => {
        btn.addEventListener("click", (event) => {
          event.stopPropagation();
          const id = btn.dataset.id;
          const planId = btn.dataset.plan;
          switch (btn.dataset.action) {
            case "edit-case":
              openCaseForm(getCase(id));
              break;
            case "add-input":
              openInputForm(id);
              break;
            case "add-plan":
              openPlanForm(id);
              break;
            case "add-goal":
              openGoalForm(id, planId);
              break;
            case "add-evaluation":
              openEvaluationForm(id, planId);
              break;
            case "add-revision":
              openRevisionForm(id, planId);
              break;
            case "close-plan":
              openClosePlanForm(id, planId);
              break;
            case "delete-goal":
              deleteGoal(id, planId, btn.dataset.goal);
              break;
            case "add-intervention":
              openInterventionForm(id);
              break;
            case "close-case":
              openCloseCaseForm(id);
              break;
          }
        });
      });
    }

    function splitPersonName(fullName) {
      const parts = String(fullName || "").trim().split(/\s+/).filter(Boolean);
      if (!parts.length) return { firstName: "", lastName: "" };
      if (parts.length === 1) return { firstName: parts[0], lastName: "" };
      return {
        firstName: parts.slice(0, -1).join(" "),
        lastName: parts[parts.length - 1]
      };
    }

    function splitAddress(address) {
      const parts = String(address || "").split(",").map(item => item.trim()).filter(Boolean);
      let street = parts[0] || "";
      let houseNumber = "";
      let city = "";
      let postalCode = "";
      const streetMatch = street.match(/^(.*?)(?:\s+(\d+[A-Za-z0-9\/-]*))$/);
      if (streetMatch) {
        street = streetMatch[1].trim() || street;
        houseNumber = streetMatch[2] || "";
      }
      const rest = parts.slice(1).join(", ");
      const postalMatch = rest.match(/(\d{3}\s?\d{2})/);
      if (postalMatch) {
        postalCode = postalMatch[1];
        city = rest.replace(postalMatch[1], "").replace(/^[,\s]+|[,\s]+$/g, "");
      } else {
        city = parts[1] || "";
      }
      return { street, houseNumber, city, postalCode };
    }

    function inferGender(member) {

      if (role.includes("matka") || role.includes("dcera") || role.includes("žena")) return "žena";

      return "";

    function buildMonitoringSheetPayload(contract) {
      const family = getCase(contract?.rodinaId);
      const person = getPrimaryContractPerson(contract);
      const personName = splitPersonName(person?.jmeno || family?.osobni?.nazevRodiny || "");
      const address = splitAddress(family?.osobni?.adresa || "");
      const cityForDate = address.city || "Valašském Meziříčí";
      const signedAt = contract?.datumPodpisu ? formatDate(contract.datumPodpisu) : formatDate(today());
      return {
        fileName: `monitorovaci-list-${((person?.jmeno || family?.osobni?.nazevRodiny || contract?.id || "klient")).toLowerCase().replace(/[^\p{L}\p{N}]+/gu, "-")}`,
        fields: {
          firstName: personName.firstName,
          lastName: personName.lastName,
          birthDate: formatDate(person?.datumNarozeni) === "-" ? "" : formatDate(person?.datumNarozeni),
          fullAddress: family?.osobni?.adresa || "",
          street: address.street,
          city: address.city,
          houseNumber: address.houseNumber,
          postalCode: address.postalCode,
          email: family?.osobni?.email || "",
          phone: family?.osobni?.telefon || "",
          temporaryAddress: address.city || "",
          gender: inferGender(person),
          laborStatus: person?.postaveniTrhPrace || "",
          education: person?.vzdelani || "",
          disadvantage: person?.znevyhodneni || "",
          placeAndDate: `V ${cityForDate} dne ${signedAt}`
        }
      };
    }

    function downloadContractDocument(contract) {
      if (!contract) return;
      const blob = new Blob([buildContractDocument(contract)], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `smlouva-${contract.id || today()}.html`;
      link.click();
      URL.revokeObjectURL(url);
    }

    async function downloadMonitoringSheet(contract) {
      if (!contract) return;
      try {
        const payload = buildMonitoringSheetPayload(contract);
        const response = await fetch("/api/export-monitoring-sheet", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });
        if (!response.ok) {
          throw new Error("Nepodařilo se vygenerovat monitorovací list.");
        }
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `${payload.fileName}.xlsm`;
        link.click();
        URL.revokeObjectURL(url);
      } catch (error) {
        console.error(error);
        alert("Monitorovací list se nepodařilo stáhnout.");
      }
    }

      if (!confirm(`Opravdu chcete smazat ${plan.verze}? Tím zmizí i jeho cíle, revize, hodnocení a navázané intervence.`)) return;
      item.plany = item.plany.filter(row => row.id !== planId);
      item.hodnoceni = (item.hodnoceni || []).filter(row => row.planId !== planId);
      item.intervence = (item.intervence || []).filter(row => row.planId !== planId);
      item.setkani = (item.setkani || []).filter(row => row.planId !== planId);
      const nextPlan = item.plany.find(row => row.stav === "aktivní") || item.plany[0] || null;
      if (nextPlan) {
        selectedPlanByCase[caseId] = nextPlan.id;
      } else {
        delete selectedPlanByCase[caseId];
      }
      delete selectedEvaluationByCase[caseId];
      delete selectedInterventionByCase[caseId];
      modalEl.close();
      saveState();
    }

      if (!item || !plan || !goal) return;
      if (!confirm(`Opravdu chcete smazat cíl „${goal.text}“? Tím zmizí i navázaná hodnocení a intervence.`)) return;
      plan.cile = plan.cile.filter(row => row.id !== goalId);
      item.hodnoceni = (item.hodnoceni || []).filter(row => row.cilId !== goalId);
      item.intervence = (item.intervence || []).filter(row => row.cilId !== goalId);
      item.setkani = (item.setkani || []).filter(row => row.cilId !== goalId);
      delete selectedEvaluationByCase[caseId];

    function attachAiAssist(form, context) {
      if (!form) return;
      const trigger = form.querySelector("[data-ai-generate]");
      const targetSelect = form.querySelector("[data-ai-target]");
      const notesField = form.querySelector("[data-ai-notes]");
      if (!trigger || !targetSelect || !notesField) return;
      trigger.addEventListener("click", async () => {
        const target = targetSelect.value;
        const targetField = form.elements.namedItem(target);
        if (!targetField) return;
        const noteText = String(notesField.value || "").trim();
        const originalLabel = trigger.textContent;
        trigger.disabled = true;
        trigger.textContent = "Generuji...";
        try {
          let draft = "";
          draft = await generateAiDraftWithGemini(context, target, noteText, form);
          if (!draft) {
            draft = generateAiDraft(context, target, noteText, form);
          }
          targetField.value = draft;
        } catch (error) {
          console.error("Gemini draft failed:", error);
          targetField.value = generateAiDraft(context, target, noteText, form);
          alert("Gemini API se nepodaĹ™ilo pouĹľĂ­t. Do pole byl vloĹľen lokĂˇlnĂ­ nĂˇvrh.");
        } finally {
          trigger.disabled = false;
          trigger.textContent = originalLabel;
        }
      });
    }

    function buildGeminiPrompt(context, target, notes, form) {
      const valueOf = name => String(form.elements.namedItem(name)?.value || "").trim();
      const targetLabel = AI_ASSIST_FIELD_LABELS[target] || target;
      const rules = [
        "PiĹˇ ÄŤesky.",
        "PiĹˇ struÄŤnÄ›, profesionĂˇlnÄ› a vÄ›cnÄ› pro dokumentaci sociĂˇlnĂ­ sluĹľby.",
        "NevymĂ˝Ĺˇlej fakta, drĹľ se jen zadanĂ˝ch podkladĹŻ a vyplnÄ›nĂ˝ch ĂşdajĹŻ.",
        "VraĹĄ jen text vhodnĂ˝ k vloĹľenĂ­ do jednoho formulĂˇĹ™ovĂ©ho pole.",
        "NepouĹľĂ­vej odrĂˇĹľky ani nadpisy, pokud to nenĂ­ nutnĂ©."
      ].join(" ");

      if (context === "education") {
        return [
          rules,
          `Pole: ${targetLabel}.`,
          `NĂˇzev akce: ${valueOf("nazevAkce") || "-"}.`,
          `Typ vzdÄ›lĂˇvĂˇnĂ­: ${valueOf("typ") || "-"}.`,
          `PoÄŤet hodin: ${valueOf("hodiny") || "-"}.`,
          `OrganizĂˇtor: ${valueOf("organizator") || "-"}.`,
          `PoznĂˇmky pracovnĂ­ka: ${notes || "-"}.`
        ].join(" ");
      }

      if (context === "supervision") {
        const participants = Array.from(form.querySelectorAll('input[name="participantIds"]:checked'))
          .map(input => input.closest("label")?.innerText?.replace(/\s+/g, " ").trim() || "")
          .filter(Boolean)
          .join(", ");
        return [
          rules,
          `Pole: ${targetLabel}.`,
          `Typ supervize: ${valueOf("typ") || "-"}.`,
          `Supervizor: ${valueOf("supervizor") || "-"}.`,
          `ĂšÄŤastnĂ­ci: ${participants || "-"}.`,
          `PoznĂˇmky pracovnĂ­ka: ${notes || "-"}.`
        ].join(" ");
      }

      if (context === "evaluation") {
        return [
          rules,
          `Pole: ${targetLabel}.`,
          `CĂ­l IP: ${valueOf("cilId") || "-"}.`,
          `MinulĂ© skĂłre: ${valueOf("skoreMinule") || "-"}.`,
          `AktuĂˇlnĂ­ skĂłre: ${valueOf("skoreAktualni") || "-"}.`,
          `MĂ­ra splnÄ›nĂ­: ${valueOf("miraSplneni") || "-"}.`,
          `PotĹ™eba Ăşpravy IP: ${valueOf("potrebaUpravy") || "-"}.`,
          `PoznĂˇmky pracovnĂ­ka: ${notes || "-"}.`
        ].join(" ");
      }

      return [
        rules,
        `Pole: ${targetLabel}.`,
        `PoznĂˇmky pracovnĂ­ka: ${notes || "-"}.`
      ].join(" ");
    }

    async function generateAiDraftWithGemini(context, target, notes, form) {
      const model = String(state.aiSettings?.model || "gemini-2.5-flash").trim() || "gemini-2.5-flash";
      const response = await fetch("/api/ai/draft", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model,
          prompt: buildGeminiPrompt(context, target, notes, form)
        })
      });

      if (!response.ok) {
        throw new Error(`Gemini API ${response.status}`);
      }

      const data = await response.json();
      return String(data?.text || "").trim();
    }

    function generateAiDraft(context, target, notes, form) {
      const valueOf = name => String(form.elements.namedItem(name)?.value || "").trim();
      const sentence = text => text ? `${text.replace(/\s+/g, " ").trim()}` : "";
      const fallbackNotes = sentence(notes);

      if (context === "education") {
        const title = valueOf("nazevAkce");
        const type = valueOf("typ");
        const hours = valueOf("hodiny");
        const organizer = valueOf("organizator");
        return sentence(
          target === "obsah"
            ? `Akce ${title || "vzdělávací akce"} byla realizována jako ${type || "vzdělávání"} v rozsahu ${hours || "neuvedeno"} hodin${organizer ? ` pod vedením ${organizer}` : ""}. Zaměřila se na odborné znalosti a dovednosti využitelné v práci s klienty. ${fallbackNotes}` 
            : fallbackNotes
        );
      }

      if (context === "supervision") {
        const type = valueOf("typ");
        const supervisor = valueOf("supervizor");
        if (target === "tema") {
          return sentence(`Supervize typu ${type || "supervize"} byla zaměřena na reflexi práce týmu, profesních rolí a navazujících postupů. ${fallbackNotes}`);
        }
        if (target === "zapis") {
          return sentence(`Proběhla ${type || "supervize"} vedená ${supervisor || "supervizorem"}, v rámci které byla reflektována aktuální pracovní situace, zátěž a další doporučené kroky pro praxi. ${fallbackNotes}`);
        }
      }

      if (context === "evaluation") {
        const goal = valueOf("cilId");
        const minule = valueOf("skoreMinule");
        const aktualni = valueOf("skoreAktualni");
        const mira = valueOf("miraSplneni");
        const snippets = {
          dukaz: `U cíle ${goal || "bez označení"} je patrný posun ze skóre ${minule || "?"} na ${aktualni || "?"}. Aktuální stav odpovídá hodnocení "${mira || "bez vyhodnocení"}" a opírá se o průběžnou práci s rodinou. ${fallbackNotes}`,
          coPomohlo: `Změnu podpořil pravidelný kontakt se službou, průběžná práce s cílem a zapojení rodiny do domluvených kroků. ${fallbackNotes}`,
          coBrdilo: `Posun zpomalují přetrvávající bariéry v rodině a proměnlivá kapacita udržet změnu v každodenní situaci. ${fallbackNotes}`,
          pohledKlientaPrinosSluzby: `Rodina vnímá jako přínos hlavně to, že měla oporu při řešení situace a srozumitelnější další kroky. ${fallbackNotes}`,
          pohledKlientaPretrvavajiciBariery: `Rodina popisuje, že část překážek stále přetrvává a změna ještě není ve všech situacích stabilní. ${fallbackNotes}`,
          dalsiKrok: `V dalším období je vhodné navázat na dosavadní práci, ověřit stabilitu změny a podle potřeby upravit návazné kroky v IP. ${fallbackNotes}`
        };
        return sentence(snippets[target] || fallbackNotes);
      }

      return fallbackNotes;
    }

          dohodaOPorozvodovePeci: formData.get("dohodaOPorozvodovePeci")
        };

          if (plan.stav === "aktivní") {
            plan.stav = "ukončený";
            plan.datumUkonceni = formData.get("datum");
            plan.duvodUkonceni = "ukončení spolupráce";

              goal.stavCile = "ukončeno bez splnění";

        });

        modalEl.close();
        saveState();
      });

          odbornyPracovnik: item.odbornyPracovnik,

          poznamka: item.poznamka
        })),
        educationRecords: state.educationRecords.map(item => ({
          vzdelavaniId: item.id,
          pracovnikId: item.workerId,
          datum: item.datum,
          typ: item.typ,
          nazevAkce: item.nazevAkce,
          obsah: item.obsah,
          hodiny: item.hodiny,
          organizator: item.organizator,
          osvedceni: item.osvedceni
        })),
        supervisions: state.supervisions.map(item => ({
          supervizeId: item.id,
          datum: item.datum,
          typ: item.typ,
          supervizor: item.supervizor,
          participantIds: item.participantIds,
          participantNames: item.participantNames,
          tema: item.tema,
          zapis: item.zapis
        })),
        evaluationActivities: {
          familyInterviews: state.evaluationActivities.familyInterviews.map(item => ({
            id: item.id,
            datum: item.datum,
            typ: item.typ,
            evaluator: item.evaluator,
            caseId: item.caseId,
            memberId: item.memberId,
            participantIds: item.participantIds,
            participantNames: item.participantNames,
            coSeZmenilo: item.coSeZmenilo,
            coPomohlo: item.coPomohlo,
            coBrzdilo: item.coBrzdilo,
            vnimaniSpoluprace: item.vnimaniSpoluprace,
            coZustavaOtevrene: item.coZustavaOtevrene,
            dalsiVyvoj: item.dalsiVyvoj
          })),
          workerInterviews: state.evaluationActivities.workerInterviews.map(item => ({
            id: item.id,
            datum: item.datum,
            workerId: item.workerId,
            workerName: item.workerName,
            workerRole: item.workerRole,
            evaluator: item.evaluator,
            coByloKlicove: item.coByloKlicove,
            coFungovaloMdt: item.coFungovaloMdt,
            coNefungovalo: item.coNefungovalo,
            roleCaseManagementu: item.roleCaseManagementu,
            systemoveBariery: item.systemoveBariery,
            doporuceni: item.doporuceni
          })),
          partnerInterviews: state.evaluationActivities.partnerInterviews.map(item => ({
            id: item.id,
            datum: item.datum,
            caseId: item.caseId,
            partnerName: item.partnerName,
            instituce: item.instituce,
            evaluator: item.evaluator,
            vnimaniSpoluprace: item.vnimaniSpoluprace,
            srozumitelnostRoli: item.srozumitelnostRoli,
            navaznostOspodIpod: item.navaznostOspodIpod,
            coFungovalo: item.coFungovalo,
            coByloSlabe: item.coByloSlabe,
            doporuceni: item.doporuceni
          })),
          caseStudies: state.evaluationActivities.caseStudies.map(item => ({
            id: item.id,
            datum: item.datum,
            caseId: item.caseId,
            title: item.title,
            author: item.author,
            kontext: item.kontext,
            vstupniSituace: item.vstupniSituace,
            hlavniCileIp: item.hlavniCileIp,
            prubehPodpory: item.prubehPodpory,
            zapojeneOdbornosti: item.zapojeneOdbornosti,
            zlomoveMomenty: item.zlomoveMomenty,
            vysledek: item.vysledek,
            pretrvavajiciRizika: item.pretrvavajiciRizika,
            pouceniProPraxi: item.pouceniProPraxi
          }))
        },
        cases: state.cases.map(item => ({
        rodinaId: item.id,
        karta: item.karta,
        vstup: item.vstup,
        plany: item.plany,
        hodnoceni: item.hodnoceni,
        intervence: item.intervence,
        setkani: item.setkani,
        intervencniPrace: buildCombinedInterventions(item),
        vystup: item.vystup,
        ukonceni: item.ukonceni,
        projektoveCile: item.projektoveCile || null
      }))
      };
      const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `mosty-v-rodine-evaluace-${today()}.json`;
      link.click();
      URL.revokeObjectURL(url);
      alert("Byl vytvořen pseudonymizovaný export bez osobních údajů rodiny.");
    }

    function renderScoreBoxes(score) {
      return SCALE_FIELDS.map(field => `
        <div class="score-box">
          <strong>${formatScaleLabel(field)}</strong>
          <p>Skóre: ${score?.[field] ?? 0}</p>
        </div>
      `).join("");
    }

    function renderDeltaBoxes(start, end) {
      return SCALE_FIELDS.map(field => {
        const delta = (end?.[field] ?? 0) - (start?.[field] ?? 0);
        const prefix = delta > 0 ? "+" : "";
        return `
          <div class="score-box">
            <strong>${formatScaleLabel(field)}</strong>
            <p>${start?.[field] ?? 0} → ${end?.[field] ?? 0} <span class="badge-soft">${prefix}${delta}</span></p>
          </div>
        `;
      }).join("");
    }

    function statusBadge(status) {
      if (status === "aktivní") return `<span class="badge badge-active">aktivní</span>`;
      if (status === "pozastavený") return `<span class="badge badge-paused">pozastavený</span>`;
      return `<span class="badge badge-closed">ukončený</span>`;
    }

    function defaultScores() {
      return SCALE_FIELDS.reduce((acc, field) => ({ ...acc, [field]: 0 }), {});
    }

    function buildCombinedInterventions(item) {
      return [
        ...item.intervence.map(row => ({ ...row, kind: "intervence" })),
        ...item.setkani.map(row => ({
          ...row,
          id: row.id,
          datum: row.datum,
          typ: row.typ,
          forma: "koordinační setkání",
          popis: row.ucastnici || "",
          ucastniciSite: row.ucastnici || "",
          pracovnik: row.ucastnici || "",
          role: "síťování",
          odbornostiMdt: row.odbornosti || [],
          delka: "",
          vysledek: row.dohody || "",
          sitoveDohody: row.dohody || "",
          dalsiKrok: row.ukoly || "",
          sitoveUkoly: row.ukoly || "",
          detailText: row.rizika || "",
          sitovaRizika: row.rizika || "",
          jednaniSOspod: row.typ === "jednání s OSPOD" ? "ano" : "ne",
          vazbaNaIpodIntervence: row.vazbaNaIpod || "ne",
          kind: "setkání"
        }))
      ].sort((a, b) => new Date(b.datum) - new Date(a.datum));
    }

    function getSelectedMember(item) {
      const members = item?.osobni?.clenove || [];
      const selectedId = selectedMemberByCase[item?.id];
      return members.find(member => member.id === selectedId) || members[0] || null;
    }

    function getProjectGoalStats() {
      const casesWithClosedPlan = state.cases.filter(item => (item.plany || []).some(plan => plan.stav !== "aktivní"));
      return {
        communication: buildGoalStat(casesWithClosedPlan, "zlepseniKomunikaceRodicu"),
        crisis: buildGoalStat(casesWithClosedPlan, "snizeniKrizovychSituaci"),
        conflict: buildGoalStat(casesWithClosedPlan, "konstruktivniReseniKonfliktu"),
        care: buildGoalStat(casesWithClosedPlan, "dohodaOPorozvodovePeci")
      };
    }

    function buildGoalStat(casesList, field) {
      const relevant = casesList.filter(item => item.projektoveCile?.[field] && item.projektoveCile[field] !== "nerelevantní");
      const success = relevant.filter(item => item.projektoveCile?.[field] === "ano").length;
      const percent = relevant.length ? Math.round((success / relevant.length) * 100) : 0;
      return {
        relevant: relevant.length,
        success,
        percent,
        text: relevant.length ? `${success}/${relevant.length} (${percent} %)` : "zatím bez relevantních uzavřených IP"
      };
    }

    function getSupportHoursStats() {
      const supportByPerson = new Map();
      state.cases.forEach(item => {
        (item.intervence || []).forEach(row => {
          if (!row.memberId) return;
          const key = `${item.id}::${row.memberId}`;
          const current = supportByPerson.get(key) || {
            caseId: item.id,
            memberId: row.memberId,
            memberName: row.memberName || "Neurčená osoba",
            totalMinutes: 0
          };
          current.totalMinutes += Number(row.delka || 0);
          supportByPerson.set(key, current);
        });
      });
      state.groupAttendances.forEach(row => {
        if (!row.memberId || !row.rodinaId) return;
        const activity = getGroupActivity(row.skupinovaAktivitaId);
        if (!activity) return;
        const key = `${row.rodinaId}::${row.memberId}`;
        const current = supportByPerson.get(key) || {
          caseId: row.rodinaId,
          memberId: row.memberId,
          memberName: row.memberName || "Neurčená osoba",
          totalMinutes: 0
        };
        current.totalMinutes += Number(activity.delkaTrvaniMin || 0);
        supportByPerson.set(key, current);
      });
      const supportedPersons = Array.from(supportByPerson.values()).filter(item => item.totalMinutes > 0);
      return {
        under40: supportedPersons.filter(item => item.totalMinutes < 40 * 60).length,
        overOrEqual40: supportedPersons.filter(item => item.totalMinutes >= 40 * 60).length,
        totalSupported: supportedPersons.length
      };
    }

    function getKa3Stats() {
      const attendanceCount = state.groupAttendances.length;
      const uniquePersons = new Set(
        state.groupAttendances
          .filter(item => item.rodinaId && item.memberId)
          .map(item => `${item.rodinaId}::${item.memberId}`)
      ).size;
      const selfHelpCount = state.groupActivities.filter(item => item.typAktivity === "svépomocná skupina").length;
      const trainingCount = state.groupActivities.filter(item => item.typAktivity === "volitelný trénink").length;
      const skillConfirmed = state.groupAttendances.filter(item => item.osvojeniDovednosti).length;
      const skillPercent = attendanceCount ? Math.round((skillConfirmed / attendanceCount) * 100) : 0;

      return {
        attendanceCount,
        uniquePersons,
        selfHelpCount,
        trainingCount,
        skillConfirmed,
        skillPercent,
        skillText: attendanceCount ? `${skillConfirmed}/${attendanceCount} (${skillPercent} %)` : "zatím bez účastí"
      };
    }

    function getCurrentYear() {
      return new Date().getFullYear();
    }

    function getEducationHoursForWorker(workerId, year = getCurrentYear()) {
      return state.educationRecords
        .filter(item => item.workerId === workerId && String(item.datum || "").startsWith(String(year)))
        .reduce((sum, item) => sum + Number(item.hodiny || 0), 0);
    }

    function getTeamDevelopmentStats(year = getCurrentYear()) {
      const expertWorkers = state.workers.filter(item => item.odbornyPracovnik);
      const workersMeeting24Hours = expertWorkers.filter(item => getEducationHoursForWorker(item.id, year) >= 24).length;
      const currentYearEducationRecords = state.educationRecords.filter(item => String(item.datum || "").startsWith(String(year))).length;
      const totalEducationHours = state.educationRecords
        .filter(item => String(item.datum || "").startsWith(String(year)))
        .reduce((sum, item) => sum + Number(item.hodiny || 0), 0);
      const currentYearSupervisions = state.supervisions.filter(item => String(item.datum || "").startsWith(String(year))).length;
      const lastSupervisionDate = [...state.supervisions]
        .sort((a, b) => new Date(b.datum) - new Date(a.datum))[0]?.datum || "";
      return {
        expertWorkers: expertWorkers.length,
        workersMeeting24Hours,
        currentYearEducationRecords,
        totalEducationHours,
        currentYearSupervisions,
        lastSupervisionDate
      };
    }

    function getProjectQualityStats() {
      const overduePlans = getDueEvaluations().filter(item => item.daysLeft < 0).length;
      const activeCasesWithoutInput = state.cases.filter(item =>
        (item.plany || []).some(plan => plan.stav === "aktivní") && !item.vstup
      ).length;
      const closedCasesWithoutOutput = state.cases.filter(item =>
        item.karta?.stav === "ukončený" && !item.vystup
      ).length;
      const activePlansCount = state.cases.reduce((sum, item) =>
        sum + (item.plany || []).filter(plan => plan.stav === "aktivní").length, 0
      );
      const onTrackPlans = Math.max(activePlansCount - overduePlans, 0);
      return {
        overduePlans,
        activeCasesWithoutInput,
        closedCasesWithoutOutput,
        onTrackPlans
      };
    }

    function getContractAlerts() {
      return state.contracts
        .map(item => {
          const family = getCase(item.rodinaId)?.osobni?.nazevRodiny || item.rodinaId || "Bez vazby na rodinu";
          const daysLeft = diffDays(today(), item.platnostDo);
          if (daysLeft > 30) return null;
          return {
            contractId: item.id,
            family,
            dueDate: item.platnostDo,
            label: daysLeft < 0 ? "Smlouva po platnosti" : "Blíží se konec platnosti smlouvy",
            detail: `Smlouva ${escapeHtml(item.id)} | platnost do ${formatDate(item.platnostDo)}`,
            remainingText: daysLeft < 0 ? `Po termínu ${Math.abs(daysLeft)} dnů` : `Zbývá ${daysLeft} dnů`
          };
        })
        .filter(Boolean)
        .sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));
    }

    function getDueEvaluations() {
      const todayValue = today();
      return state.cases.flatMap(item => {
        const activePlans = (item.plany || []).filter(plan => plan.stav === "aktivní");
        return activePlans.map(plan => {
          const planEvaluations = (item.hodnoceni || [])
            .filter(row => row.planId === plan.id && row.typ === "trimesiční")
            .sort((a, b) => new Date(b.datum) - new Date(a.datum));
          const dueDate = addMonths(plan.datumZalozeni, (planEvaluations.length + 1) * 3);
          const daysLeft = diffDays(todayValue, dueDate);
          const label = daysLeft < 0 ? "3měsíční revize IP po termínu" : (daysLeft === 0 ? "3měsíční revize IP dnes" : "Blíží se 3měsíční revize IP");
          const detail = `IP ${escapeHtml(plan.verze)} | termín ${formatDate(dueDate)}`;
          const remainingText = daysLeft < 0
            ? `Po termínu ${Math.abs(daysLeft)} dnů`
            : (daysLeft === 0 ? "Zbývá 0 dnů" : `Zbývá ${daysLeft} dnů`);
          return {
            caseId: item.id,
            planId: plan.id,
            family: item.osobni?.nazevRodiny || item.id,
            dueDate,
            daysLeft,
            label,
            detail,
            remainingText
          };
        });
      }).sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));
    }

    function getGoals(item) {
      return item.plany.flatMap(plan => plan.cile);
    }

    function today() {
      return new Date().toISOString().split("T")[0];
    }

    function createId(prefix) {
      return `${prefix}-2026-${String(Date.now()).slice(-6)}`;
    }

    function addMonths(value, count) {
      if (!value) return today();
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return today();
      date.setMonth(date.getMonth() + count);
      return date.toISOString().split("T")[0];
    }

    function diffDays(fromDate, toDate) {
      const from = new Date(fromDate);
      const to = new Date(toDate);
      if (Number.isNaN(from.getTime()) || Number.isNaN(to.getTime())) return 9999;
      const ms = 24 * 60 * 60 * 1000;
      return Math.ceil((to - from) / ms);
    }

    function formatDate(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleDateString("cs-CZ");
    }

    function formatScaleLabel(field) {
      return field.replaceAll("_", " ");
    }

    function splitComma(value) {
      return String(value || "").split(",").map(item => item.trim()).filter(Boolean);
    }

    function renderMembersForTextarea(members) {
      return (members || []).map(member => `${member.jmeno} | ${member.role || ""} | ${member.datumNarozeni || ""} | ${member.postaveniTrhPrace || ""} | ${member.vzdelani || ""} | ${member.znevyhodneni || ""} | ${member.trvaleBydliste || ""}`).join("\n");
    }

    function parseMembers(text) {
      return String(text || "")
        .split("\n")
        .map(row => row.trim())
        .filter(Boolean)
        .map((row, index) => {
          const [jmeno = "", role = "", datumNarozeni = "", postaveniTrhPrace = "", vzdelani = "", znevyhodneni = "", trvaleBydliste = ""] = row.split("|").map(part => part.trim());
          return { id: `CL-${Date.now()}-${index}`, jmeno, role, datumNarozeni, postaveniTrhPrace, vzdelani, znevyhodneni, trvaleBydliste };
        });
    }

    function selectHtml(name, options, selected) {
      return `<select name="${name}">${options.map(option => `<option value="${escapeAttribute(option)}"${option === selected ? " selected" : ""}>${escapeHtml(option)}</option>`).join("")}</select>`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function escapeAttribute(value) {
      return escapeHtml(value).replaceAll("'", "&#39;");
    }
  </script>
</body>
